<head>
    <!-- 设置网页字符编码为 UTF-8，保证中文和多语言正常显示 -->
    <meta charset="UTF-8">

    <!-- 移动端响应式设置：
         width=device-width：视口宽度等于设备宽度
         initial-scale=1.0：初始缩放比例为 1 -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- 页面标题，显示在浏览器标签上：
         {{ page.title }}：当前页面标题
         {{ site.title }}：网站全局标题 -->
    <title>{{ page.title }} - {{ site.title }}</title>

    <!-- 引入自定义样式文件 style.css，用于控制页面排版和视觉效果 -->
    <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">

    <link rel="stylesheet" href="{{ '/assets/css/header.css' | relative_url }}">

    <link rel="stylesheet" href="{{ '/assets/css/footer.css' | relative_url }}">

    <link rel="stylesheet" href="{{ '/assets/css/markdown.css' | relative_url }}">

     <!-- _includes/head.html 或 _layouts/default.html -->
     
     
     
     <!-- KaTeX CSS -->
     <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css"
          integrity="sha384-n8MVd4RsNIU0tAv4ct0nTaAbDJwPJzDEaqSD1odI+WdtXRGWt2kTvGFasHpSy3SV" crossorigin="anonymous">

     <!-- 为了自动渲染数学公式 -->
     <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"
          integrity="sha384-XjKyOOlGwcjNTAIQHIpgOno0Hl1YQqzUOEleOLALmuqehneUG+vnGctmUb0ZY0l8"
          crossorigin="anonymous"></script>

     <!-- 为了自动渲染数学公式 -->
     <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js"
          integrity="sha384-+VBxd3r6XgURycqtZ117nYw44OOcIax56Z4dCRWbxyPt0Koah1uHoK0o4+/RRE05"
          crossorigin="anonymous"></script>

     <script>
          document.addEventListener("DOMContentLoaded", function () {
               renderMathInElement(document.body, {
                    delimiters: [
                         { left: '$$', right: '$$', display: true },
                         { left: '$', right: '$', display: false },
                         { left: '\\(', right: '\\)', display: false },
                         { left: '\\[', right: '\\]', display: true }
                    ],
                    throwOnError: false
               });
          });
     </script>
     
  
</head>
