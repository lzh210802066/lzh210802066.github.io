<head>
    <!-- 设置网页字符编码为 UTF-8，保证中文和多语言正常显示 -->
    <meta charset="UTF-8">

    <!-- 移动端响应式设置：
         width=device-width：视口宽度等于设备宽度
         initial-scale=1.0：初始缩放比例为 1 -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- 页面标题，显示在浏览器标签上：
         {{ page.title }}：当前页面标题
         {{ site.title }}：网站全局标题 -->
    <title>{{ page.title }} - {{ site.title }}</title>

    <!-- 引入自定义样式文件 style.css，用于控制页面排版和视觉效果() -->

<!-- 
     CSS 中重复选择器的基本规则：后写的规则会覆盖前面的规则（同等权重情况下）
     CSS 遵循层叠规则（Cascading）：
     越后面的样式优先级越高（除非权重不同）
     同一个选择器后写的样式会覆盖之前的设置
     不同文件引入顺序影响样式：
     <link rel="stylesheet" href="style.css">

     <link rel="stylesheet" href="markdown.css">

     浏览器按顺序加载，后面的文件可以覆盖前面文件的样式
-->



     <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">

     <link rel="stylesheet" href="{{ '/assets/css/markdown.css' | relative_url }}">

    <link rel="stylesheet" href="{{ '/assets/css/header.css' | relative_url }}">

    <link rel="stylesheet" href="{{ '/assets/css/footer.css' | relative_url }}">


    

     <!-- _includes/head.html 或 _layouts/default.html -->
     

     <!-- =========代码块高亮======= -->

     <!-- Prism.js 浅色主题 -->
     <link href="https://cdn.jsdelivr.net/npm/prismjs/themes/prism.css" rel="stylesheet">

     <!-- Prism.js 主脚本 -->
     <script src="https://cdn.jsdelivr.net/npm/prismjs/prism.js"></script>

     <!-- 可选：加载语言支持，例如 Python、C、HTML、CSS -->
     <script src="https://cdn.jsdelivr.net/npm/prismjs/components/prism-python.min.js"></script>
     <script src="https://cdn.jsdelivr.net/npm/prismjs/components/prism-javascript.min.js"></script>
     <script src="https://cdn.jsdelivr.net/npm/prismjs/components/prism-css.min.js"></script>
     <script src="https://cdn.jsdelivr.net/npm/prismjs/components/prism-html.min.js"></script>
     <script src="https://cdn.jsdelivr.net/npm/prismjs/components/prism-c.min.js"></script>
     <script src="https://cdn.jsdelivr.net/npm/prismjs/components/prism-cpp.min.js"></script>
     <script src="https://cdn.jsdelivr.net/npm/prismjs/components/prism-json.min.js"></script>
     <script src="https://cdn.jsdelivr.net/npm/prismjs/components/prism-markdown.min.js"></script>
     <script src="https://cdn.jsdelivr.net/npm/prismjs/components/prism-bash.min.js"></script>
     <script src="https://cdn.jsdelivr.net/npm/prismjs/components/prism-yaml.min.js"></script>
     <script src="https://cdn.jsdelivr.net/npm/prismjs/components/prism-java.min.js"></script>
     


 

     <!-- KaTeX CSS -->
     <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css"
          integrity="sha384-n8MVd4RsNIU0tAv4ct0nTaAbDJwPJzDEaqSD1odI+WdtXRGWt2kTvGFasHpSy3SV" crossorigin="anonymous">

     <!-- 为了自动渲染数学公式 -->
     <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"
          integrity="sha384-XjKyOOlGwcjNTAIQHIpgOno0Hl1YQqzUOEleOLALmuqehneUG+vnGctmUb0ZY0l8"
          crossorigin="anonymous"></script>

     <!-- 为了自动渲染数学公式 -->
     <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js"
          integrity="sha384-+VBxd3r6XgURycqtZ117nYw44OOcIax56Z4dCRWbxyPt0Koah1uHoK0o4+/RRE05"
          crossorigin="anonymous"></script>

     <script>
          document.addEventListener("DOMContentLoaded", function () {
               renderMathInElement(document.body, {
                    delimiters: [
                         { left: '$$', right: '$$', display: true },
                         { left: '$', right: '$', display: false },
                         { left: '\\(', right: '\\)', display: false },
                         { left: '\\[', right: '\\]', display: true }
                    ],
                    throwOnError: false
               });
          });
     </script>

     
     <!-- Medium Zoom -->
     <script src="https://cdnjs.cloudflare.com/ajax/libs/medium-zoom/1.0.6/medium-zoom.min.js"></script>
     <script>
          // 页面加载完成后初始化
          document.addEventListener('DOMContentLoaded', function () {
               // 为文章内的所有图片添加缩放功能
               mediumZoom('article img, .post-content img, .content img', {
                    margin: 24,           // 图片与边缘的距离
                    background: '#000',   // 背景颜色
                    scrollOffset: 0,      // 滚动偏移
                    container: null,
                    template: null
               });
          });


     </script>
</head>
