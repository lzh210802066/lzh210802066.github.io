<!-- ===============================
  文件路径：_includes/footer.html
  作用：网站的统一页脚部分
  =============================== -->

<footer class="site-footer">
  <!--
    Footer 区域：页面底部的版权声明与作者信息。
    此部分通常会显示：
    - 网站版权年份（自动更新）
    - 作者名称（来自 Jekyll 配置文件）
    - 版权声明文本
    -->

  <p>
    <!-- 
        &copy; ：HTML 实体字符，显示为版权符号 ©。  
        {{ "now" | date: "%Y" }} ：Jekyll 内置过滤器，用于动态输出当前年份（如 2025）。  
        {{ site.author.name }} ：从 _config.yml 中读取作者姓名字段。  
        "All rights reserved." ：标准版权声明，表示保留所有权利。
        -->
    &copy; {{ "now" | date: "%Y" }} {{ site.author.name }}. All rights reserved.
  </p>
</footer>





<!--===========================================================
    ===========================================================
    ===========================================================
    ===========================================================
    ============================================================-->


<style>
/* .site-footer 类：控制页脚整体布局与外观*/

.site-footer
{
      text-align: center;
      /* 让页脚文本水平居中显示 */
      padding: 1em 0;
      /* 在页脚上下各增加 1em 的内边距，使布局更美观 */
      font-size: 0.95em;
      /* 字体稍微缩小，避免喧宾夺主 */
      color: #6a737d;
      /* 使用柔和的灰色字体，视觉舒适 */
}
</style>
