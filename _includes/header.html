<header class="site-header">
  <nav class="navbar">
    <!-- 网站标题
    <h1>
      <a href="{{ '/' | relative_url }}">{{ site.title }}</a>
    </h1>-->

    <!-- 网站标题改为头像 -->
    <h1 class="site-logo">
      <a href="{{ '/' | relative_url }}">
        <img src="/assets/images/OHM.jpg" alt="avatar">
      </a>
    </h1>



    <!-- 网站描述 
    <p>{{ site.description }}</p>
    -->

    <!-- 主导航 -->
    <ul class="nav-links">
      {% for item in site.data.navigation.main %}
      <li>
        <a href="{{ item.url | relative_url }}">{{ item.title }}</a>
        {% if item.children %}
        <ul class="dropdown">
          {% for child in item.children %}
          <li><a href="{{ child.url | relative_url }}">{{ child.title }}</a></li>
          {% endfor %}
        </ul>
        {% endif %}
      </li>
      {% endfor %}
    </ul>
  </nav>
</header>



<style>
  .site-logo img {
    width: 80px;
    height: 80px;
    border-radius: 50%;
    object-fit: cover;
  }
</style>
