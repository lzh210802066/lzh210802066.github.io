<header class="site-header">
  <nav class="navbar">
    <!-- 网站标题 -->
    <h1>
      <a href="{{ '/' | relative_url }}">{{ site.title }}</a>
    </h1>

    <!-- 网站描述 
    <p>{{ site.description }}</p>
    -->

    <!-- 主导航 -->
    <ul class="nav-links">
      {% for item in site.data.navigation.main %}
      <li>
        <a href="{{ item.url | relative_url }}">{{ item.title }}</a>
        {% if item.children %}
        <ul class="dropdown">
          {% for child in item.children %}
          <li><a href="{{ child.url | relative_url }}">{{ child.title }}</a></li>
          {% endfor %}
        </ul>
        {% endif %}
      </li>
      {% endfor %}

      <form role="search" method="get" id="search-form">
        <input type="text" id="search-input" placeholder="Search..." />
      </form>
      <ul id="results"></ul>




    </ul>
  </nav>
</header>


<script>
  var options = {
    searchInput: document.getElementById('search-input'),  // 搜索框
    resultsContainer: document.getElementById('results'),  // 搜索结果容器
    json: '/assets/js/search.json'  // `search.json` 文件路径
  };

  var search = new SimpleJekyllSearch(options);
</script>
