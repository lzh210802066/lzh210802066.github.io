<!-- ============================================
💡 响应式 Header：桌面端横排，手机端折叠菜单
============================================ -->
<header class="site-header">
  <nav class="navbar">
    <!-- 网站标题 -->
    <h1 class="site-title">
      <a href="{{ '/' | relative_url }}">{{ site.title }}</a>
    </h1>

    <!-- 汉堡菜单按钮（手机端显示） -->
    <button class="menu-toggle" aria-label="切换导航菜单">☰</button>

    <!-- 导航栏 -->
    <ul class="nav-links">
      {% for item in site.data.navigation.main %}
      <li>
        <a href="{{ item.url | relative_url }}">{{ item.title }}</a>

        {% if item.children %}
        <ul class="dropdown">
          {% for child in item.children %}
          <li><a href="{{ child.url | relative_url }}">{{ child.title }}</a></li>
          {% endfor %}
        </ul>
        {% endif %}
      </li>
      {% endfor %}
    </ul>
  </nav>
</header>
