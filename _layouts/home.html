---
layout: default
---

<section class="home">
  <h1>最新文章</h1>

  {% if site.posts.size > 0 %}
    <ul class="post-list">
      {% for post in site.posts %}
        <li>
          <h2>
            <a href="{{ post.url | relative_url }}">{{ post.title }}</a>
          </h2>
          <p class="post-date">{{ post.date | date: "%Y-%m-%d" }}</p>
          <p>{{ post.excerpt | strip_html | truncate: 120 }}</p>
        </li>
      {% endfor %}
    </ul>
  {% else %}
    <p>暂无文章。</p>
  {% endif %}
</section>
