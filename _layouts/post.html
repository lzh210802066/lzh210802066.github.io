{% include head.html %}
{% include header.html %}

<main>
    <article class="post-page">
        <header class="post-header">
            <h1 class="post-title">
                {{ page.title }}
                <small class="post-date">· {{ page.date | date: "%Y-%m-%d" }}</small>
            </h1>
        </header>

        <div class="post-content">
            {{ content }}
        </div>
    </article>
</main>
