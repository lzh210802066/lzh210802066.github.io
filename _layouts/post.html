<!DOCTYPE html>
<html lang="zh-CN">

{% include head.html %}

<body>
{% include header.html %}

<link rel="stylesheet" href="{{ '/assets/css/posts.css' | relative_url }}">




<main>
    <article class="post-page">
        <header class="post-header">
            <h1 class="post-title">
                {{ page.title }}
                <small class="post-date">· {{ page.date | date: "%Y-%m-%d" }}</small>
            </h1>
        </header>

        <div class="post-content">
            {{ content }}
        </div>
    </article>
</main>



{% include footer.html %}

</body>
</html>
