<!DOCTYPE html>
<html lang="zh-CN">

{% include head.html %}

<body>
    {% include header.html %}

    <link rel="stylesheet" href="{{ '/assets/css/posts.css' | relative_url }}">

    <!-- 新增目录样式 -->
    <style>
        /* 整体布局容器 - 包含目录和主内容 */
        .page-layout {
            display: flex;
            gap: 20px;
            max-width: 1400px;
            margin: 0 auto;
            padding: 0px;
            align-items: flex-start;
        }

        /* 目录侧边栏 */
        .toc-wrapper {
            flex: 0 0 200px;
            position: sticky;
            top: 20px;
            height: fit-content;
            max-height: calc(100vh - 40px);
            overflow-y: auto;
        }

        .toc {
            background: white;
            border-radius: 8px;
            padding: 0px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }

        .toc-title {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 0px;
            color: #2c3e50;
            border-bottom: 2px solid #3498db;
            padding-bottom: 0px;
        }

        .toc ul {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .toc li {
            margin: 5px 0;
        }

        .toc a {
            text-decoration: none;
            color: #555;
            display: block;
            padding: 5px 0px;
            border-radius: 4px;
            transition: all 0.3s;
            font-size: 14px;
        }

        .toc a:hover {
            background: #e8f4f8;
            color: #3498db;
            transform: translateX(5px);
        }

        .toc a.active {
            background: #3498db;
            color: white;
            font-weight: 500;
        }

        .toc .toc-h3 {
            padding-left: 15px;
            font-size: 13px;
        }

        .toc .toc-h4 {
            padding-left: 30px;
            font-size: 12px;
        }

        /* 主内容区域 */
        .main-content-wrapper {
            flex: 1;
            min-width: 0;
        }

        main.post-with-lines {
            background: white;
            padding: 40px;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: none;
            margin: 0;
        }

        /* 滚动条样式 */
        .toc-wrapper::-webkit-scrollbar {
            width: 6px;
        }

        .toc-wrapper::-webkit-scrollbar-track {
            background: #f1f1f1;
            border-radius: 3px;
        }

        .toc-wrapper::-webkit-scrollbar-thumb {
            background: #888;
            border-radius: 3px;
        }

        .toc-wrapper::-webkit-scrollbar-thumb:hover {
            background: #555;
        }

        /* 响应式设计 - 移动端 
        @media (max-width: 768px) {
            .page-layout {
                flex-direction: column;
            }

            .toc-wrapper {
                position: static;
                flex: 1;
                max-height: none;
                order: -1;
                
            } */
            /* 响应式设计 - 移动端：当宽度小于 768px 时隐藏目录 */
        @media (max-width: 768px) {
            .toc-wrapper {
                display: none; /* 直接隐藏整个目录侧边栏 */
            }

            .page-layout {
                flex-direction: column;
                gap: 0; /* 移动端不需要间距 */
            }

            main.post-with-lines {
                padding: 2px;
                border-radius: 0; /* 手机端通常去圆角更美观，可选 */
            }
        }

            main.post-with-lines {
                padding: 20px;
            }
        }

        /* 文章标题区域 */
        .post-header {
            margin-bottom: 2rem;
        }

        p {
            margin-bottom: 20px;
            font-size: 18px;
        }

        #copyTip {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(0, 0, 0, 0.8);
            color: #fff;
            padding: 10px 15px;
            border-radius: 5px;
            font-size: 14px;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s;
            z-index: 9999;
        }
    </style>

    <!-- 整体布局：目录和主内容并排 -->
    <div class="page-layout">
        <!-- 目录侧边栏 -->
        <aside class="toc-wrapper">
            <nav class="toc">
                <div class="toc-title" >目录</div>
                <ul id="toc-list">
                    <!-- 目录会通过JavaScript自动生成 -->
                </ul>
            </nav>
        </aside>

        <!-- 主内容区域（包含正文） -->
        <div class="main-content-wrapper">
            <main class="post-with-lines">
                <!-- 文章内容 -->
                <article class="post-page">
                    <header class="post-header">
                        <h1 class="post-title">
                            {{ page.title }}
                            <small class="post-date">· {{ page.date | date: "%Y-%m-%d" }}</small>
                        </h1>
                    </header>

                    <div class="post-content">
                        {{ content }}
                    </div>
                </article>
            </main>

            <!-- Footer 也放在主内容区域内 -->
            {% include footer.html %}
        </div>
    </div>

    <div id="copyTip">已复制</div>

    <script>
        // ========== 自动生成目录 ==========
        function generateTOC() {
            const content = document.querySelector('.post-content');
            const headings = content.querySelectorAll('h2, h3, h4');
            const tocList = document.getElementById('toc-list');

            // 为每个标题添加 ID（如果没有的话）
            headings.forEach((heading, index) => {
                if (!heading.id) {
                    heading.id = `heading-${index}`;
                }

                const li = document.createElement('li');
                const a = document.createElement('a');
                a.href = `#${heading.id}`;
                a.textContent = heading.textContent;

                // 根据标题级别添加不同的类名
                if (heading.tagName === 'H2') {
                    a.className = 'toc-h2';
                } else if (heading.tagName === 'H3') {
                    a.className = 'toc-h3';
                } else if (heading.tagName === 'H4') {
                    a.className = 'toc-h4';
                }

                // 点击平滑滚动
                a.addEventListener('click', (e) => {
                    e.preventDefault();
                    heading.scrollIntoView({ behavior: 'smooth', block: 'start' });
                    // 更新 URL hash
                    history.pushState(null, null, `#${heading.id}`);
                });

                li.appendChild(a);
                tocList.appendChild(li);
            });
        }

        // ========== 高亮当前阅读的章节 ==========
        function highlightCurrentSection() {
            const headings = document.querySelectorAll('.post-content h2, .post-content h3, .post-content h4');
            const tocLinks = document.querySelectorAll('.toc a');

            if (headings.length === 0 || tocLinks.length === 0) return;

            window.addEventListener('scroll', () => {
                let current = '';
                const scrollPos = window.scrollY + 100;

                headings.forEach(heading => {
                    const sectionTop = heading.offsetTop;

                    if (scrollPos >= sectionTop) {
                        current = heading.id;
                    }
                });

                tocLinks.forEach(link => {
                    link.classList.remove('active');
                    if (link.getAttribute('href') === `#${current}`) {
                        link.classList.add('active');
                    }
                });
            });
        }

        // ========== 复制功能 ==========
        const copyTip = document.getElementById('copyTip');

        function showTip() {
            copyTip.style.opacity = '1';
            setTimeout(() => copyTip.style.opacity = '0', 1000);
        }

        function copyTextToClipboard(text) {
            if (!text) return;
            if (navigator.clipboard && navigator.clipboard.writeText) {
                navigator.clipboard.writeText(text).then(showTip).catch(() => fallbackCopy(text));
            } else {
                fallbackCopy(text);
            }
        }

        function fallbackCopy(text) {
            const textarea = document.createElement('textarea');
            textarea.value = text;
            document.body.appendChild(textarea);
            textarea.select();
            try {
                document.execCommand('copy');
                showTip();
            } catch (err) {
                console.error('复制失败', err);
            }
            textarea.remove();
        }

        document.addEventListener('mouseup', (event) => {
            if (event.button !== 0) return;

            setTimeout(() => {
                const selection = window.getSelection().toString().trim();
                if (selection.length > 0) {
                    copyTextToClipboard(selection);
                }
            }, 20);
        });

        // ========== 页面加载完成后执行 ==========
        document.addEventListener('DOMContentLoaded', () => {
            generateTOC();
            highlightCurrentSection();

            // 如果 URL 中有 hash，滚动到对应位置
            if (window.location.hash) {
                setTimeout(() => {
                    const target = document.querySelector(window.location.hash);
                    if (target) {
                        target.scrollIntoView({ behavior: 'smooth' });
                    }
                }, 100);
            }
        });
    </script>

</body>

</html>
