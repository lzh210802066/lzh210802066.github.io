---
layout: default   # 指定使用默认布局（_layouts/default.html）
---

<!-- 
文章页面整体结构：
每篇文章都会套用这个布局文件（通常是 _layouts/post.html）
包含标题、日期和正文内容。
-->
<article class="post">

    <!-- 
    头部区域：包含文章标题与日期
    -->
    <header class="post-header">

        <!-- 
        h1：文章主标题
        - 使用 class="post-title" 便于单独设置样式
        - small 标签内的日期显示在标题后面，用较小字体
        -->
        <h1 class="post-title">
            {{ page.title }}   <!-- 输出文章标题 -->
            <small class="post-date">· {{ page.date | date: "%Y-%m-%d" }}</small>  <!-- 输出格式化日期 -->
        </h1>

    </header>

    <!-- 
    正文区域：
    - {{ content }} 是文章 Markdown 渲染后的主要内容
    - 使用 class="post-content" 便于控制排版样式（如段落间距、代码块等）
    -->
    <div class="post-content">
        {{ content }}
    </div>

</article>
