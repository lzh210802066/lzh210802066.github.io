{% include head.html %}
{% include header.html %}


<main>
    <article class="post-page">
        <header class="post-header">
            <h1 class="post-title">
                {{ page.title }}
                <small class="post-date">· {{ page.date | date: "%Y-%m-%d" }}</small>
            </h1>
        </header>

        <div class="post-content">
            {{ content }}
        </div>
    </article>
</main>

{% include footer.html %}

<style>
    /* post 页面专属样式 */
        
    .post-header .post-title  /* 单篇文章标题 */
    {
        font-size: 2rem;
        font-weight: 700;
        line-height: 1.3;
        display: flex;          /* 保持标题与日期同行 */
        align-items: baseline;  /* 日期对齐底部 */
        gap: 0.5rem;            /* 标题和日期间距 */
        background: none;       /* 移除背景 */
        border: none;           /* 移除边框 */
        padding: 0;             /* 移除多余内边距 */
    }

    /* 单篇文章标题后的日期 */
    .post-header .post-title .post-date 
    {
        font-size: 0.65em;
        color: #999;
        background: none;       /* 移除背景 */
        border: none;           /* 移除边框 */
        padding: 0;             /* 移除多余内边距 */
    }

    /* 单篇文章正文内容 */
    .post-content 
    {
        margin-top: 2rem;         /* 与标题区分开 */
        font-size: 1rem;          /* 正文字号 */
        line-height: 1.7;         /* 阅读舒适行距 */
    }

    /* 各级标题在文章内容中的统一样式 */
    .post-content h1,
    .post-content h2,
    .post-content h3 
    {
        margin-top: 2rem;         /* 上方间距 */
        margin-bottom: 1rem;      /* 下方间距 */
        color: #2c3e50;           /* 深色标题 */
    }

    /* 正文段落间距 */
    .post-content p 
    {
        margin-bottom: 1rem;
    }



        /* 1️⃣ 保证文章内容区不会横向溢出 */
    .post-content 
    {
        overflow-x: hidden;          /* 防止横向滚动条 */
        word-wrap: break-word;       /* 防止长文字或链接撑开 */
    }

    /* 2️⃣ 图片自适应内容区宽度 */
    .post-content img 
    {
        display: block;              /* 避免行内间距 */
        max-width: 100%;             /* 最大宽度不超过父容器 */
        width: 100%;                 /* 强制宽度随父容器缩放 */
        height: auto;                /* 保持纵横比 */
        margin: 1rem 0;              /* 上下间距 */
        object-fit: contain;         /* 缩放时不裁剪图片 */
    }

    /* 3️⃣ 图片父容器（如 <p>）也限制宽度 */
    .post-content p 
    {
        max-width: 100%;             /* 防止父元素撑开 */
        overflow: hidden;            /* 隐藏可能溢出的部分 */
    }


    /* 防止首页文章内容溢出 */
    .post-content,
    .content 
    {
        max-width: 100%;
        word-break: break-word;
        overflow-wrap: break-word;
        white-space: normal;
    }

    .post-content img,
    .post-content table,
    .post-content pre,
    .post-content code 
    {
        max-width: 50%;
        overflow-x: auto;
        word-break: break-word;
    }

        /* 覆盖通用设置，允许自定义宽度 */
    .post-content img[width],
    .post-content img[style],
    .post-content img[class*="img"] 
    {
        width: auto !important;
        max-width: 100%;
    }

</style>
