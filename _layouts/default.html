<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ page.title }} - {{ site.title }}</title>

    <!-- 自定义样式 -->
    <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">

    <!-- 代码高亮 Highlight.js -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">

    <!-- KaTeX 数学公式 -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css"
        integrity="sha384-n8MVd4RsNIU0tAv4ct0nTaAbDJwPJzDEaqSD1odI+WdtXRGWt2kTvGFasHpSy3SV" crossorigin="anonymous">
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"
        integrity="sha384-XjKyOOlGwcjNTAIQHIpgOno0Hl1YQqzUOEleOLALmuqehneUG+vnGctmUb0ZY0l8"
        crossorigin="anonymous"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js"
        integrity="sha384-+VBxd3r6XgURycqtZ117nYw44OOcIax56Z4dCRWbxyPt0Koah1uHoK0o4+/RRE05"
        crossorigin="anonymous"></script>

    <!-- Mermaid 图表支持 -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mermaid/10.6.1/mermaid.min.js"></script>

    <!-- Font Awesome 图标 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <!-- 增强 Markdown 样式 -->
    <style>
        /* ========== 基础 Markdown 样式 ========== */

        /* 标题样式 */
        main h1,
        main h2,
        main h3,
        main h4,
        main h5,
        main h6 {
            margin-top: 1.5em;
            margin-bottom: 0.5em;
            font-weight: 600;
            line-height: 1.3;
        }

        main h1 {
            font-size: 2em;
            border-bottom: 2px solid #eaecef;
            padding-bottom: 0.3em;
        }

        main h2 {
            font-size: 1.5em;
            border-bottom: 1px solid #eaecef;
            padding-bottom: 0.3em;
        }

        main h3 {
            font-size: 1.25em;
        }

        main h4 {
            font-size: 1em;
        }

        main h5 {
            font-size: 0.875em;
        }

        main h6 {
            font-size: 0.85em;
            color: #6a737d;
        }

        /* 段落与行高 */
        main p {
            margin-bottom: 1em;
            line-height: 1.6;
        }

        /* 链接样式 */
        main a {
            color: #0366d6;
            text-decoration: none;
        }

        main a:hover {
            text-decoration: underline;
        }

        /* 列表样式 */
        main ul,
        main ol {
            margin-bottom: 1em;
            padding-left: 2em;
        }

        main li {
            margin-bottom: 0.25em;
        }

        main ul ul,
        main ol ul,
        main ul ol,
        main ol ol {
            margin-top: 0.25em;
            margin-bottom: 0.25em;
        }

        /* 任务列表（GitHub 风格）*/
        main input[type="checkbox"] {
            margin-right: 0.5em;
        }

        main li.task-list-item {
            list-style-type: none;
            margin-left: -1.5em;
        }

        /* 引用块 */
        main blockquote {
            margin: 1em 0;
            padding: 0.5em 1em;
            border-left: 4px solid #dfe2e5;
            background-color: #f6f8fa;
            color: #6a737d;
        }

        main blockquote p {
            margin: 0;
        }

        /* 水平分割线 */
        main hr {
            border: none;
            border-top: 2px solid #eaecef;
            margin: 2em 0;
        }

        /* 行内代码 */
        main code {
            padding: 0.2em 0.4em;
            margin: 0;
            font-size: 85%;
            background-color: rgba(175, 184, 193, 0.2);
            border-radius: 3px;
            font-family: 'SFMono-Regular', Consolas, 'Liberation Mono', Menlo, monospace;
        }

        /* 代码块 */
        main pre {
            padding: 1em;
            overflow: auto;
            font-size: 85%;
            line-height: 1.45;
            background-color: #f6f8fa;
            border-radius: 6px;
            margin-bottom: 1em;
        }

        main pre code {
            padding: 0;
            margin: 0;
            background-color: transparent;
            border-radius: 0;
            font-size: 100%;
        }

        /* 表格样式 */
        main table {
            border-collapse: collapse;
            width: 100%;
            margin-bottom: 1em;
            overflow: auto;
            display: block;
        }

        main table th,
        main table td {
            padding: 6px 13px;
            border: 1px solid #dfe2e5;
        }

        main table th {
            font-weight: 600;
            background-color: #f6f8fa;
        }

        main table tr {
            background-color: #fff;
            border-top: 1px solid #c6cbd1;
        }

        main table tr:nth-child(2n) {
            background-color: #f6f8fa;
        }

        /* 图片样式 */
        main img {
            max-width: 100%;
            height: auto;
            display: block;
            margin: 1em auto;
            border-radius: 4px;
        }

        /* 脚注样式 */
        main .footnotes {
            margin-top: 2em;
            padding-top: 1em;
            border-top: 1px solid #eaecef;
            font-size: 0.9em;
            color: #6a737d;
        }

        /* 定义列表 */
        main dl dt {
            font-weight: 600;
            margin-top: 1em;
        }

        main dl dd {
            margin-left: 2em;
            margin-bottom: 0.5em;
        }

        /* 删除线 */
        main del {
            color: #6a737d;
        }

        /* 高亮文本 */
        main mark {
            background-color: #fff3cd;
            padding: 0.1em 0.2em;
        }

        /* 键盘按键样式 */
        main kbd {
            display: inline-block;
            padding: 3px 5px;
            font-size: 11px;
            line-height: 10px;
            color: #444d56;
            vertical-align: middle;
            background-color: #fafbfc;
            border: solid 1px #d1d5da;
            border-bottom-color: #c6cbd1;
            border-radius: 3px;
            box-shadow: inset 0 -1px 0 #c6cbd1;
        }

        /* 缩写（abbr）样式 */
        main abbr[title] {
            border-bottom: 1px dotted #6a737d;
            cursor: help;
            text-decoration: none;
        }

        /* 告示框（自定义）*/
        main .alert {
            padding: 1em;
            margin-bottom: 1em;
            border-left: 4px solid;
            border-radius: 4px;
        }

        main .alert-info {
            background-color: #d1ecf1;
            border-color: #0c5460;
            color: #0c5460;
        }

        main .alert-warning {
            background-color: #fff3cd;
            border-color: #856404;
            color: #856404;
        }

        main .alert-danger {
            background-color: #f8d7da;
            border-color: #721c24;
            color: #721c24;
        }

        main .alert-success {
            background-color: #d4edda;
            border-color: #155724;
            color: #155724;
        }

        /* Mermaid 图表容器 */
        main .mermaid {
            text-align: center;
            margin: 1em 0;
        }

        /* 响应式调整 */
        @media (max-width: 768px) {
            main h1 {
                font-size: 1.75em;
            }

            main h2 {
                font-size: 1.35em;
            }

            main table {
                font-size: 0.9em;
            }
        }
    </style>

    <script>
        // KaTeX 数学公式自动渲染
        document.addEventListener("DOMContentLoaded", function () {
            renderMathInElement(document.body, {
                delimiters: [
                    { left: '$$', right: '$$', display: true },
                    { left: '$', right: '$', display: false },
                    { left: '\\[', right: '\\]', display: true },
                    { left: '\\(', right: '\\)', display: false }
                ],
                throwOnError: false,
                strict: false
            });

            // 初始化 Mermaid 图表
            mermaid.initialize({
                startOnLoad: true,
                theme: 'default',
                securityLevel: 'loose'
            });
        });
    </script>
</head>

<body>
    <header>
        <nav>
            <h1><a href="{{ '/' | relative_url }}">{{ site.title }}</a></h1>
            <p>{{ site.description }}</p>
        </nav>
    </header>

    <main>
        {{ content }}
    </main>

    <footer>
        <p>&copy; {{ "now" | date: "%Y" }} {{ site.author.name }}. All rights reserved.</p>
    </footer>

    <!-- 代码高亮初始化 -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <script>hljs.highlightAll();</script>
</body>

</html>
