<!DOCTYPE html>
<!--
============================================================
📘 声明 HTML 文档类型为 HTML5。
    ✅ 告诉浏览器使用标准模式渲染页面。
    ⚠️ 必须放在文档最开头，否则可能触发怪异模式。
============================================================
-->

<html lang="zh-CN">
<!--
lang="zh-CN"
🔹 定义页面主要语言为简体中文。
🔹 有助于搜索引擎识别内容语言。
🔹 屏幕阅读器也会根据语言做出语音调整。
-->

    <!-- ============================================================
        💡 引入 Head 模板
        ============================================================ -->
    
    <!--
        🔹 使用 Jekyll 的 include 指令插入 _includes/head.html 文件。
        🔹 head.html 包含网页的元信息、样式表、脚本库（KaTeX、Mermaid、Highlight.js 等）。
        🔹 修改 _includes/head.html 后，所有引用此模板的页面都会自动更新。
        -->
    {% include head.html %}


<body>
<!--============================================================
🧭 页面主体结构
    ============================================================-->

    <!-- ============================================================
        💡 引入 Header 页头模板
        ============================================================ -->

    <!--
        🔹 使用 Jekyll 的 include 指令插入 _includes/header.html 文件。
        🔹 实现全站统一的页头内容（网站标题、导航栏等）。
        🔹 修改 _includes/header.html 后，所有引用此模板的页面都会自动更新。
    -->
    {% include header.html %}


    <main>
        {{ content }}
    </main>
    <!-- Main 区域：用于展示正文内容。 content  是 Jekyll 的占位符，这里故意不出现****，有冲突 
    其是一个 Liquid 占位符，用于插入当前页面内容（index.html 或 post.html 的 HTML）。
    即使你把它放在 HTML 注释外，只要注释里也包含  content  或 Liquid 语法，Jekyll 会先处理 Liquid 标签。
    有时 Jekyll 会在生成 HTML 时，解析注释内的 Liquid，占位符内容可能被意外插入最终 HTML。
    简单说：Liquid 处理注释里内容和正文内容的顺序可能导致注释中的文字被“泄漏”到页面上。-->

    
    <!-- ============================================================
        💡 引入 Footer 页脚模板
        ============================================================ -->

    <!--
        🔹 使用 Jekyll 的 include 指令插入 _includes/footer.html 文件。
        🔹 实现全站统一的页脚内容（版权、作者信息等）。
        🔹 修改 _includes/footer.html 后，所有引用此模板的页面都会自动更新。
        -->
    {% include footer.html %}


    
</body>

</html>
