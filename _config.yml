# 网站设置
title: 我的个人博客
description: 记录技术与生活
baseurl: ""
url: "https://你的用户名.github.io"

# 作者信息
author:
  name: 你的名字
  email: your-email@example.com

# 构建设置
markdown: kramdown
kramdown:
  input: GFM
  syntax_highlighter: rouge
  math_engine: mathjax
  hard_wrap: false
  
# 插件
plugins:
  - jekyll-feed
  - jekyll-seo-tag

# 排除文件
exclude:
  - Gemfile
  - Gemfile.lock
  - README.md
