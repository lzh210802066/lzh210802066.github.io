# 网站信息
title: 我的博客              # 网站标题，会显示在浏览器标签和首页
description: 这是我的第一个博客 # 网站描述，SEO 和搜索结果中会用到
url: "https://username.github.io" # 你博客的网址
baseurl: "/my-blog"          # 仓库名，如果是 username.github.io，则可以留空 ""

# 主题
theme: minima                # GitHub Pages 默认主题

# 作者信息（可选）
author:
  name: "你的名字"
  email: "your-email@example.com"

# 首页配置
paginate: 5                  # 首页每页显示文章数量
paginate_path: "/page:num/"  # 分页路径

# Markdown 配置
markdown: kramdown
kramdown:
  input: GFM                 # 支持 GitHub 风格的 Markdown
