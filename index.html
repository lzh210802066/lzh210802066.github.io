---
layout: default        # 告诉 Jekyll 本页面使用 _layouts/default.html 作为布局模板
title: 首页            # 定义当前页面标题变量，可在 default.html 中通过 {{ page.title }} 调用
---

<!--
Jekyll 会在生成网站时，将此文件的内容插入到 default.html 的 {{ content }} 位置。
因此，这个文件只负责定义首页的主要内容部分。
-->

<!-- “home” 是首页内容的主容器，对应 CSS 中的 .home 样式（控制整体排版与间距） -->
<div class="home">
    
    <!-- 二级标题，显示“最新文章”，对应 CSS 的 h2 样式（一般字体较大且间距适中） -->
    <h2>最新文章</h2>
    
    <!-- 文章列表容器，使用 <ul> 表示无序列表，配合 CSS 中的 .post-list 样式 -->
    <ul class="post-list">
        
        <!-- 
        使用 Liquid 模板语言的 for 循环：
        site.posts 是 Jekyll 自动生成的所有文章数组（按时间倒序排列）。
        每篇文章对象 post 包含：
          - post.title  ：标题
          - post.url    ：文章路径
          - post.date   ：发布日期
          - post.excerpt：文章摘要
        Jekyll 会自动从 _posts 目录读取 .md 文件并生成这些属性。
        -->
        {% for post in site.posts %}
        
        <!-- 每篇文章对应一个 <li> 条目，对应 CSS 中 .post-list li 样式（有底部分割线与内边距） -->
        <li>

            <!-- 
            标题部分：
            - <h2> 对应文章标题
            - <a> 是链接，指向该文章的实际页面
            - {{ post.url | relative_url }} 可确保在本地预览和线上部署路径都能正确链接
            -->
            <h2>
                <a href="{{ post.url | relative_url }}">
                    {{ post.title }}    <!-- 输出文章标题 -->
                </a>
            </h2>

            <!-- 
            日期部分：
            - 使用 <p class="post-meta"> 设置元信息样式（灰色文字、较小字号）
            - {{ post.date | date: "%Y年%m月%d日" }} 使用 Liquid 的 date 过滤器格式化日期输出
              例如：2025年10月12日
            -->
            <p class="post-meta">
                {{ post.date | date: "%Y年%m月%d日" }}
            </p>

            <!-- 
            摘要部分：
            - {{ post.excerpt }} 输出文章摘要
            - 如果文章的 Markdown 文件中没有显式设置 excerpt，
              Jekyll 会自动截取文章开头几行生成。
            -->
            <p>
                {{ post.excerpt }}
            </p>
        </li>

        <!-- 
        for 循环结束：
        每次循环生成一篇文章的标题、日期和摘要。
        Jekyll 渲染后，这里会成为一个完整的文章列表。
        -->
        {% endfor %}
    </ul>
</div>
