---
layout: default
title: 技能文章
---

<h1>技能文章</h1>

<ul class="post-list">
    {% for post in site.categories.skill %}
    <li>
        <article class="post-preview">
            <h2>
                <a href="{{ post.url }}">{{ post.title }}</a>
                <small class="post-preview-date">· {{ post.date | date: "%Y-%m-%d" }}</small>
            </h2>
            <p>{{ post.excerpt }}</p>
            <a href="{{ post.url }}">阅读全文 →</a>
        </article>
    </li>
    {% endfor %}
</ul>

{% if site.categories.skill.size == 0 %}
<p style="color: #999; text-align: center; margin: 2em 0;">
    暂无技能类文章，快去 _posts/ 文件夹创建文章吧！
</p>
{% endif %}
